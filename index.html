<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tsakalo's Fashion | Premium Store</title>
    <style>
        :root {
            --azul-escuro: #1a3a5a;
            --dourado: #c5a059;
            --gelo: #f4f4f4;
            --branco: #ffffff;
            --whatsapp: #25d366;
        }

        body { font-family: 'Segoe UI', sans-serif; margin: 0; background: var(--gelo); }

        /* MENU HAMBÚRGUER & HEADER */
        header {
            background: var(--azul-escuro);
            color: white;
            padding: 15px 20px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            position: sticky;
            top: 0;
            z-index: 1000;
        }

        .menu-icon { font-size: 30px; cursor: pointer; }
        
        .nav-menu {
            position: fixed;
            top: 0; left: -250px;
            width: 250px; height: 100%;
            background: #333;
            transition: 0.3s;
            padding-top: 60px;
        }
        .nav-menu.active { left: 0; }
        .nav-menu a { display: block; color: white; padding: 15px 25px; text-decoration: none; }

        /* FILTROS E BUSCA */
        .controls { padding: 20px; text-align: center; background: white; }
        .busca-container { margin-bottom: 15px; }
        .busca-input { padding: 10px; width: 60%; border-radius: 5px; border: 1px solid #ddd; }
        
        .categorias { display: flex; justify-content: center; gap: 10px; flex-wrap: wrap; }
        .btn-filter { 
            padding: 8px 15px; border: none; border-radius: 20px; 
            cursor: pointer; background: #ddd; transition: 0.3s;
        }
        .btn-filter.active { background: var(--dourado); color: white; }

        /* GRID DE PRODUTOS */
        .container { 
            max-width: 1200px; margin: 20px auto; 
            display: grid; 
            grid-template-columns: repeat(auto-fill, minmax(260px, 1fr)); 
            gap: 20px; padding: 0 20px;
        }

        /* CARD DE PRODUTO */
        .card { 
            background: white; border-radius: 10px; padding: 15px; 
            box-shadow: 0 4px 6px rgba(0,0,0,0.1);
            display: flex; flex-direction: column;
        }
        .main-img { 
            width: 100%; height: 250px; object-fit: cover; 
            border-radius: 8px; cursor: pointer;
        }
        
        .thumbs { display: grid; grid-template-columns: repeat(4, 1fr); gap: 5px; margin-top: 10px; }
        .thumb { 
            width: 100%; height: 50px; object-fit: cover; 
            border-radius: 4px; cursor: pointer; border: 2px solid transparent;
        }
        .thumb:hover { border-color: var(--dourado); }

        .card h3 { margin: 15px 0 5px; font-size: 1.1em; }
        .card-desc { color: #666; font-size: 0.85em; margin-bottom: 10px; min-height: 40px; }
        .preco { font-weight: bold; color: var(--azul-escuro); font-size: 1.2em; margin-bottom: 15px; }

        .btn-pedido {
            background: var(--whatsapp); color: white; border: none;
            padding: 12px; border-radius: 5px; font-weight: bold; cursor: pointer;
        }

        footer { text-align: center; padding: 40px; background: var(--azul-escuro); color: white; margin-top: 50px; }
    </style>
</head>
<body>

<header>
    <div class="menu-icon" onclick="toggleMenu()">☰</div>
    <h1 style="font-size: 1.2em;">TSAKALO'S FASHION</h1>
    <div style="width: 30px;"></div> </header>

<nav class="nav-menu" id="navMenu">
    <a href="#" onclick="toggleMenu()">✖ Fechar</a>
    <a href="#produtos">Produtos</a>
    <a href="#sobre">Sobre Nós</a>
    <a href="#contatos">Contactos</a>
</nav>

<div class="controls">
    <div class="busca-container">
        <input type="text" id="searchInput" class="busca-input" placeholder="Pesquisar produto..." onkeyup="filtrarTudo()">
    </div>
    <div class="categorias" id="categoryButtons">
        <button class="btn-filter active" onclick="setCategory('todos')">Todos</button>
        <button class="btn-filter" onclick="setCategory('calcados')">Calçados</button>
        <button class="btn-filter" onclick="setCategory('camisas')">Camisas</button>
        <button class="btn-filter" onclick="setCategory('acessorios')">Acessórios</button>
        <button class="btn-filter" onclick="setCategory('camisetas')">Camisetas</button>
        <button class="btn-filter" onclick="setCategory('calcas')">Calças</button>
    </div>
</div>

<div class="container" id="productGrid">
    </div>

<footer>&copy; 2026 Tsakalo's Fashion</footer>

<script>
    // 1. DADOS DOS PRODUTOS (Exemplo de estrutura para 20+ produtos)
    const produtos = [
        {
            id: 1,
            categoria: 'calcados',
            nome: 'Sapato Oxford Premium',
            preco: '3.500 MT',
            fotos: [
                { url: 'https://images.unsplash.com/photo-1549298916-b41d501d3772?w=400', desc: 'Visão Frontal - Couro Legítimo' },
                { url: 'https://images.unsplash.com/photo-1560769629-975ec94e6a86?w=400', desc: 'Detalhe Lateral' },
                { url: 'https://images.unsplash.com/photo-1542291026-7eec264c27ff?w=400', desc: 'Sola Antiderrapante' },
                { url: 'https://images.unsplash.com/photo-1595950653106-6c9ebd614d3a?w=400', desc: 'Embalagem de Luxo' }
            ]
        },
        {
            id: 2,
            categoria: 'camisas',
            nome: 'Camisa Slim Fit Gelo',
            preco: '1.800 MT',
            fotos: [
                { url: 'https://images.unsplash.com/photo-1596755094514-f87e34085b2c?w=400', desc: 'Algodão Egípcio' },
                { url: 'https://images.unsplash.com/photo-1589310243389-96a5483213a8?w=400', desc: 'Punho Ajustável' },
                { url: 'https://images.unsplash.com/photo-1604691815943-34aa3e8464f8?w=400', desc: 'Gola Rígida' },
                { url: 'https://images.unsplash.com/photo-1621072156002-e2fcced0b170?w=400', desc: 'Costura Reforçada' }
            ]
        },
        // Adicione mais 18 produtos seguindo esse padrão...
    ];

    let categoriaAtual = 'todos';

    function renderizarProdutos(lista) {
        const grid = document.getElementById('productGrid');
        grid.innerHTML = '';

        lista.forEach(p => {
            const card = document.createElement('div');
            card.className = 'card';
            card.innerHTML = `
                <img src="${p.fotos[0].url}" class="main-img" id="main-${p.id}" title="${p.fotos[0].desc}">
                <div class="thumbs">
                    ${p.fotos.map((f, index) => `
                        <img src="${f.url}" class="thumb" 
                             onclick="mudarFoto(${p.id}, '${f.url}', '${f.desc}')" 
                             onmouseover="mostrarTooltip(this, '${f.desc}')" 
                             title="${f.desc}">
                    `).join('')}
                </div>
                <h3>${p.nome}</h3>
                <p class="card-desc" id="desc-${p.id}">${p.fotos[0].desc}</p>
                <span class="preco">${p.preco}</span>
                <button class="btn-pedido" onclick="fazerPedido(${p.id})">Pedir no WhatsApp</button>
            `;
            grid.appendChild(card);
        });
    }

    // 2. FUNÇÕES DE INTERAÇÃO
    function mudarFoto(id, url, desc) {
        document.getElementById(`main-${id}`).src = url;
        document.getElementById(`desc-${id}`).innerText = desc;
    }

    function toggleMenu() {
        document.getElementById('navMenu').classList.toggle('active');
    }

    function setCategory(cat) {
        categoriaAtual = cat;
        const buttons = document.querySelectorAll('.btn-filter');
        buttons.forEach(btn => btn.classList.remove('active'));
        event.target.classList.add('active');
        filtrarTudo();
    }

    function filtrarTudo() {
        const termo = document.getElementById('searchInput').value.toLowerCase();
        
        const filtrados = produtos.filter(p => {
            const matchesCat = (categoriaAtual === 'todos' || p.categoria === categoriaAtual);
            const matchesSearch = p.nome.toLowerCase().includes(termo);
            return matchesCat && matchesSearch;
        });
        
        renderizarProdutos(filtrados);
    }

    function fazerPedido(id) {
        const p = produtos.find(item => item.id === id);
        const fotoAtual = document.getElementById(`main-${id}`).src;
        const descAtual = document.getElementById(`desc-${id}`).innerText;
        
        const numero = "258848534256";
        const mensagem = `*NOVO PEDIDO*\n\n` +
                         `*Produto:* ${p.nome}\n` +
                         `*Detalhe:* ${descAtual}\n` +
                         `*Preço:* ${p.preco}\n\n` +
                         `*Link da Foto:* ${fotoAtual}`;

        const url = `https://api.whatsapp.com/send?phone=${numero}&text=${encodeURIComponent(mensagem)}`;
        window.location.href = url;
    }

    // Inicializar loja
    renderizarProdutos(produtos);
</script>

</body>
</html>
